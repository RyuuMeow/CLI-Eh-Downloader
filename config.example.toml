# CLI-Eh-Downloader Configuration
# Copy this file to config.toml and fill in your settings.

[download]
# Default download directory (relative to current working directory)
download_dir = "./downloads"
# Maximum parallel image downloads
max_parallel = 3
# Delay between HTTP requests (seconds) to avoid rate limiting
rate_limit_delay = 1.5
# Number of retries on failure
retry_count = 3
# Delay between retries (seconds)
retry_delay = 5.0
# Prefer torrent download when available
prefer_torrent = true
# Default download mode: auto, ask, direct
default_download_mode = "auto"

[cookies]
# Required for ExHentai access. Get these from your browser cookies.
ipb_member_id = ""
ipb_pass_hash = ""
igneous = ""
# Optional but recommended
sk = ""

[display]
# Show Japanese title when available
show_japanese_title = true
# Enable debug logging
debug_mode = false

[search]
# Start search pages in bulk mode
bulk_mode_default = false
# Open the search result page in browser after searching and paging
open_result_website_automatically = false
# Open gallery website when clicking a search result (single mode only)
open_gallery_website_onclick = false
# Start gallery download when clicking a search result (single mode only)
download_gallery_onclick = false
# Skip the per-result action menu when clicking a search result (single mode only)
no_sub_menu = false
