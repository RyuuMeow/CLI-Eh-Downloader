# CLI-Eh-Downloader Configuration
# Copy this file to config.toml and fill in your settings.

[download]
# Default download directory (relative to current working directory)
download_dir = "./downloads"
# Maximum parallel image downloads
max_parallel = 3
# Delay between HTTP requests (seconds) to avoid rate limiting
rate_limit_delay = 1.5
# Number of retries on failure
retry_count = 3
# Delay between retries (seconds)
retry_delay = 5.0
# Default download mode: auto, ask, direct
default_download_mode = "auto"
# Queue auto/direct downloads immediately and fetch gallery info in the background
fast_queue = true

[torrent]
# External torrent client executable path. Empty = auto-detect qBittorrent or the
# Windows default .torrent client, then save the detected value back to config.
client_exe_path = ""
# Placeholders: {exe}, {download_dir}, {torrent_path}. Empty = auto-template.
# qBittorrent example: "\"{exe}\" --save-path=\"{download_dir}\" \"{torrent_path}\""
command_template = ""

[cookies]
# Required for ExHentai access. Get these from your browser cookies.
ipb_member_id = ""
ipb_pass_hash = ""
igneous = ""
# Optional but recommended
sk = ""

[display]
# Show Japanese title when available
show_japanese_title = true
# Enable detailed HTTP/download logs and full task tracebacks
debug_mode = false

[search]
# Start search pages in bulk mode
bulk_mode_default = false
# Open the search result page in browser after searching and paging
open_result_website_automatically = false
# Open gallery website when clicking a search result (single mode only)
open_gallery_website_onclick = false
# Start gallery download when clicking a search result (single mode only)
download_gallery_onclick = false
# Skip the per-result action menu when clicking a search result (single mode only)
no_sub_menu = false
# Treat non-command, non-link input as a search keyword
auto_detect_search_keyword = true

[sorting]
# Gallery folder sorting: auto, artist, keyword, off
auto_sort = "off"
# Comma-separated keywords for keyword sorting. Earlier keywords have higher priority.
sort_by_keyword_keywords = ""
# Lower number wins when auto_sort = "auto" and both artist/keyword are available.
auto_sort_artist_priority = 10
auto_sort_keyword_priority = 20

[filter]
# Filter AI-related title keywords and tags in search/page downloads.
# Direct gallery URL downloads are not filtered.
anti_ai = false
# Comma-separated keywords to exclude from search/page downloads.
keyword_filter = ""

[page_download]
# Last used page download settings. These are overwritten whenever checkout is opened.
# Fetch mode: iter, current, range
fetch_mode = "current"
start_page = 1
end_page = 1
# Download mode: auto, ask, direct
download_mode = "auto"
# 0 = unlimited
max_galleries = 0
# 0 = no limit
max_size_mb = 0.0
keyword_filter = ""
download_dir = ""
